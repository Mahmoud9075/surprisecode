<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  /* Beautiful romantic gradient background */
  background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #ffb3c6 100%);
  font-family: "Outfit", sans-serif;
  overflow: hidden;
}

/* Glassmorphic card styling */
#wrapper {
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.4);
  padding: 40px;
  border-radius: 24px;
  box-shadow: 0 15px 35px rgba(233, 77, 88, 0.15);
  text-align: center;
  max-width: 400px;
  width: 90%;
  transition: all 0.3s ease;
}

.gif-container {
  width: 100%;
  height: 220px;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 20px;
  overflow: hidden;
  border-radius: 16px;
}

#gif {
  max-height: 100%;
  max-width: 100%;
  object-fit: cover;
  border-radius: 16px;
  transition: transform 0.3s ease;
}

#gif:hover {
  transform: scale(1.05);
}

h2 {
  font-size: 2em;
  color: #e94d58;
  margin-bottom: 20px;
  font-weight: 700;
}

#btn-group {
  width: 100%;
  height: 50px;
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
  position: relative;
}

button {
  width: 130px;
  height: 50px;
  font-size: 1.1em;
  font-weight: 600;
  border-radius: 50px;
  outline: none;
  cursor: pointer;
  border: none;
  transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

#yes-btn {
  background: #e94d58;
  color: white;
  box-shadow: 0 8px 20px rgba(233, 77, 88, 0.3);
}

#yes-btn:hover {
  transform: scale(1.1);
  background: #d43b46;
  box-shadow: 0 10px 25px rgba(233, 77, 88, 0.4);
}

#yes-btn:active {
  transform: scale(0.95);
}

#no-btn {
  background: white;
  color: #e94d58;
  border: 2px solid #e94d58;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
  position: relative;
  transition: left 0.15s ease, top 0.15s ease, transform 0.2s ease;
}

#no-btn:active {
  transform: scale(0.95);
}

/* Extra animations */
@keyframes floatBalloon{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-20px) rotate(3deg)}}
@keyframes heartRain{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(360deg);opacity:0}}
@keyframes bearDance{0%,100%{transform:rotate(-4deg) translateY(0)}50%{transform:rotate(4deg) translateY(-8px)}}
@keyframes badgeSpin{to{transform:rotate(360deg)}}
@keyframes namePulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,107,.4)}50%{box-shadow:0 0 0 12px rgba(255,107,107,0)}}
@keyframes starSpark{0%,100%{transform:scale(1) rotate(0);opacity:1}50%{transform:scale(1.5) rotate(20deg);opacity:.6}}
@keyframes slideL{from{opacity:0;transform:translateX(-50px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideR{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{from{opacity:0;transform:scale(0) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes gridAnim{0%,100%{opacity:.4}50%{opacity:.7}}

.rain-heart{position:fixed;top:-30px;pointer-events:none;animation:heartRain linear infinite;z-index:0}
.star-d{position:absolute;color:#2d3748;animation:starSpark ease-in-out infinite}
.heart-d{position:absolute;animation:starSpark ease-in-out infinite}
</style>

<!-- Heart cursor -->
<script>
var colours=['#ff3366','#ff6699','#ff33cc','#ff99cc','#ff66b2','#ff0066'];
var minisize=16,maxisize=28,hearts=66;
var x=ox=400,y=oy=300,swide=800,shigh=600,sleft=sdown=0;
var herz=[],herzx=[],herzy=[],herzs=[],kiss=false;
function addRVLoadEvent(f){var o=window.onload;window.onload=o?function(){o();f();}:f;}
addRVLoadEvent(function(){
  for(var i=0;i<hearts;i++){var h=document.createElement("div");h.style.cssText="position:absolute;visibility:hidden;z-index:1001;pointer-events:none;opacity:.75";h.style.color=colours[i%colours.length];h.appendChild(document.createTextNode("♥"));document.body.appendChild(h);herz[i]=h;herzy[i]=false;}
  set_scroll();set_width();herzle();
});
function herzle(){var c;if(Math.abs(x-ox)>1||Math.abs(y-oy)>1){ox=x;oy=y;for(c=0;c<hearts;c++)if(herzy[c]===false){herz[c].style.left=(herzx[c]=x-minisize/2)+"px";herz[c].style.top=(herzy[c]=y-minisize)+"px";herz[c].style.fontSize=minisize+"px";herz[c].style.visibility="visible";herzs[c]=minisize;break;}}for(c=0;c<hearts;c++)if(herzy[c]!==false){herzy[c]-=herzs[c]/minisize+c%2;herzx[c]+=(c%5-2)/5;if(herzy[c]<sdown-herzs[c]){herz[c].style.visibility="hidden";herzy[c]=false;}else{if(Math.random()<maxisize/herzy[c]&&herzs[c]<maxisize)herz[c].style.fontSize=(++herzs[c])+"px";herz[c].style.top=herzy[c]+"px";herz[c].style.left=herzx[c]+"px";}}setTimeout(herzle,40);}
document.onmousemove=function(e){if(e){y=e.pageY;x=e.pageX;}};
window.onresize=function(){swide=window.innerWidth;};
function set_scroll(){sdown=window.pageYOffset||0;sleft=window.pageXOffset||0;}
function set_width(){swide=window.innerWidth;}
</script>
</head>

<!-- Brand -->
<div style="position:fixed;bottom:8px;right:12px;z-index:9999;font-size:11px;color:rgba(45,55,72,.45);font-family:Georgia,serif;pointer-events:none">🎁 SurpriseCode</div>

<script>
// URL params
var p = new URLSearchParams(location.search);
var personName  = p.get('name')  || 'Cutie';
var birthDate   = p.get('date')  || '06 March 2002';
var letterText  = p.get('msg')   || 'You are a very special person. Wishing you all the best today and always. Happy Birthday! 💕';
var letterTitle = p.get('title') || 'To you';

document.getElementById('personName').textContent = personName;
document.getElementById('dateText').textContent = birthDate;

// Heart rain
var hr = document.getElementById('heartRain');
['💕','💖','💗','❤','🌸','✨'].forEach(function(e){
  for(var i=0;i<4;i++){
    var h=document.createElement('div');h.className='rain-heart';h.textContent=e;
    h.style.cssText='left:'+(Math.random()*100)+'%;font-size:'+(12+Math.random()*12)+'px;animation-duration:'+(5+Math.random()*8)+'s;animation-delay:'+(-Math.random()*10)+'s';
    hr.appendChild(h);
  }
});

// Letter logic
var iL=0,iT=0;
var arrL=letterText.split(''),arrT=letterTitle.split('');
var timerL,timerT;

document.getElementById('btn__letter').addEventListener('mouseenter',function(){
  this.style.background='#ff6b9d';this.style.color='#fff';
});
document.getElementById('btn__letter').addEventListener('mouseleave',function(){
  this.style.background='transparent';this.style.color='#ff6b9d';
});

$("#btn__letter").on("click",function(){
  $(".box__letter").slideDown();
  setTimeout(function(){$(".letter__border").slideDown();},1000);
  setTimeout(function(){
    timerT=setInterval(function(){
      if(iT<arrT.length){var el=document.querySelector(".title__letter");el.textContent+=arrT[iT];var ic=document.createElement("i");ic.className="fa-solid fa-heart";el.appendChild(ic);iT++;}
      else clearInterval(timerT);
    },100);
  },2000);
  setTimeout(function(){
    $("#heart__letter,#mewmew").addClass("animationOp");
    $(".love__img").addClass("animationOp");
  },2800);
  setTimeout(function(){$(".heart").addClass("animation");},3500);
  setTimeout(function(){
    timerL=setInterval(function(){
      if(iL<arrL.length){document.querySelector(".text__letter p").textContent+=arrL[iL];iL++;}
      else clearInterval(timerL);
    },50);
  },6000);
});

$(".close").on("click",function(){
  clearInterval(timerL);clearInterval(timerT);
  document.querySelector(".title__letter").textContent="";
  document.querySelector(".text__letter p").textContent="";
  iL=0;iT=0;
  $("#heart__letter,#mewmew").removeClass("animationOp");
  $(".love__img").removeClass("animationOp");
  $(".heart").removeClass("animation");
  $(".box__letter").slideUp();$(".letter__border").slideUp();
});
</script>
</body>
