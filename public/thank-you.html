<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تم إرسال طلبك — SurpriseCode</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:#ece3d8;color:#2b3327;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.box{max-width:420px}
.emoji{font-size:70px;margin-bottom:14px;animation:pop .5s ease}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
h1{font-family:'Amiri',serif;font-size:26px;color:#b89968;margin-bottom:10px}
p{font-size:14px;color:#5a5446;margin-bottom:10px;line-height:1.8}
.order-num{display:inline-block;background:rgba(184,153,104,.1);border:1px dashed #b89968;border-radius:12px;padding:10px 22px;font-weight:700;color:#b89968;margin:14px 0}
.steps-mini{text-align:right;background:rgba(255,255,255,.5);border-radius:14px;padding:16px 20px;margin:20px 0;font-size:13px;color:#5a5446;line-height:2}
a{display:inline-flex;align-items:center;gap:8px;background:#2b3327;color:#ece3d8;padding:13px 30px;border-radius:30px;text-decoration:none;font-size:14px;font-weight:700;transition:.3s;margin-top:6px}
a:hover{transform:translateY(-2px)}
</style>
</head>
<body>
  <div class="box">
    <div class="emoji">🎉</div>
    <h1>تم إرسال طلبك بنجاح!</h1>
    <p>شكراً لثقتك فينا. طلبك وصلنا وهنبدأ نراجعه دلوقتي.</p>
    <div class="order-num" id="orderNumBox" style="display:none">رقم الطلب: <span id="orderNumText"></span></div>
    <div class="steps-mini">
      <div>1️⃣ هنراجع الإيصال ونأكد استلام المبلغ</div>
      <div>2️⃣ هنبدأ في تنفيذ مشروعك فوراً</div>
      <div>3️⃣ هيوصلك اللينك جاهز على واتساب</div>
    </div>
    <a href="/">← ارجع للرئيسية</a>
  </div>
  <script>
    var params = new URLSearchParams(window.location.search);
    var num = params.get('order');
    if(num){
      document.getElementById('orderNumBox').style.display='inline-block';
      document.getElementById('orderNumText').textContent = '#'+num;
    }
  </script>
</body>
</html>
