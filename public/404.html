<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصفحة مش موجودة — SurpriseCode</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:#ece3d8;color:#2b3327;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.box{max-width:420px}
.emoji{font-size:70px;margin-bottom:10px;animation:float 2.4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
h1{font-family:'Amiri',serif;font-size:28px;color:#b89968;margin-bottom:10px}
p{font-size:14px;color:#5a5446;margin-bottom:24px;line-height:1.8}
a{display:inline-flex;align-items:center;gap:8px;background:#2b3327;color:#ece3d8;padding:13px 30px;border-radius:30px;text-decoration:none;font-size:14px;font-weight:700;transition:.3s}
a:hover{transform:translateY(-2px)}
</style>
</head>
<body>
  <div class="box">
    <div class="emoji">🎁</div>
    <h1>الصفحة دي مش موجودة</h1>
    <p>يمكن اللينك غلط أو الصفحة اتشالت. متقلقش، ارجع لموقعنا وشوف كل المفاجآت اللي عندنا.</p>
    <a href="/">← ارجع للرئيسية</a>
  </div>
</body>
</html>
